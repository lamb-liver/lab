<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <filter id="goldGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1600" height="1000" fill="#0A0A0A"/>

  <!-- 坐標軸，自原點 (700, 700) 出發 -->
  <line x1="700" y1="700" x2="1210" y2="812" stroke="#D8D8D8" stroke-width="4" opacity="0.18" stroke-linecap="round" stroke-dasharray="14 12"/>
  <line x1="700" y1="700" x2="286" y2="588" stroke="#D8D8D8" stroke-width="4" opacity="0.18" stroke-linecap="round" stroke-dasharray="14 12"/>
  <line x1="700" y1="700" x2="700" y2="228" stroke="#D8D8D8" stroke-width="4" opacity="0.18" stroke-linecap="round" stroke-dasharray="14 12"/>

  <!-- 平面：四角依序 (340,690) (860,806) (1160,690) (640,574) -->
  <path d="M 340 690 L 860 806 L 1160 690 L 640 574 Z"
        fill="rgba(160,205,255,0.13)" stroke="#5DADE2" stroke-width="5" opacity="0.88"/>

  <!-- 三個坐標平面影子：低權重，暗示位置讀法 -->
  <line x1="700" y1="700" x2="880" y2="740" stroke="#C6A6EB" stroke-width="5" opacity="0.55" stroke-linecap="round"/>
  <path d="M 880 740 L 850 728 L 852 752 Z" fill="#C6A6EB" opacity="0.55"/>
  <line x1="700" y1="700" x2="596" y2="576" stroke="#C6A6EB" stroke-width="5" opacity="0.55" stroke-linecap="round"/>
  <path d="M 596 576 L 610 604 L 630 586 Z" fill="#C6A6EB" opacity="0.55"/>

  <!-- 法向量 n̂：垂直於平面，方向 (-1, -3) -->
  <line x1="742" y1="668" x2="672" y2="458" stroke="#A4E1B0" stroke-width="7" opacity="0.95" stroke-linecap="round" filter="url(#softGlow)"/>
  <path d="M 672 458 L 656 502 L 694 496 Z" fill="#A4E1B0" opacity="0.95"/>

  <!-- v 端點到平面的垂線段：與 n̂ 反向平行，垂足落在平面內 -->
  <line x1="950" y1="318" x2="1077" y2="699" stroke="#D4B87A" stroke-width="5" opacity="0.45" stroke-linecap="round" stroke-dasharray="18 14"/>
  <circle cx="1077" cy="699" r="14" fill="#5DADE2" opacity="0.92"/>

  <!-- 主向量 v -->
  <line x1="700" y1="700" x2="950" y2="318" stroke="#D4B87A" stroke-width="9" opacity="0.96" stroke-linecap="round" filter="url(#goldGlow)"/>
  <path d="M 950 318 L 922 366 L 968 372 Z" fill="#D4B87A" opacity="0.96"/>

  <circle cx="700" cy="700" r="11" fill="#D4B87A" opacity="0.92"/>
</svg>
