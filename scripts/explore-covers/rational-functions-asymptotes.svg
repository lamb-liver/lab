<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <filter id="goldGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1600" height="1000" fill="#0A0A0A"/>

  <!--
    R(x) = (x − 2)/(x − 1)，即內容頁的標準形 A(x−r)/(x−a) 取 A=1、r=2、a=1。
    螢幕對應：x = 800 + 145X、y = 500 − 105Y。
    於是垂直漸近線落在 945、水平漸近線落在 395、零點落在 (1090, 500)——
    與這張圖原本就畫著的兩條漸近線完全吻合，可見本來就是要畫這個函數。

    左支原本畫反了：它在最左端離水平漸近線 225px（該貼近），
    卻在極點旁只差 13px（該發散）。有理函數在 x → ±∞ 的極限相同，
    不存在「單側才有水平漸近線」。兩支現在都由函數逐點取樣產生。

    也移除了原本一條 opacity 0.18 的灰色曲線：它不是這個函數的斜漸近線
    （A(x−r)/(x−a) 的次數差為 0，根本沒有斜漸近線），也判讀不出其他意義。
  -->

  <line x1="250" y1="500" x2="1370" y2="500" stroke="#D8D8D8" stroke-width="4" opacity="0.18" stroke-linecap="round"/>
  <line x1="800" y1="120" x2="800" y2="880" stroke="#D8D8D8" stroke-width="4" opacity="0.16" stroke-linecap="round"/>

  <!-- 垂直漸近線 x = 945 -->
  <line x1="945" y1="120" x2="945" y2="880" stroke="#E76F51" stroke-width="7" opacity="0.58" stroke-linecap="round" stroke-dasharray="22 22"/>

  <!--
    水平漸近線。原本掛 filter="url(#blueGlow)"，整條都沒畫出來——
    水平線的 bounding box 高度為零，而 filter 預設用 objectBoundingBox
    算區域，`-30% / 160%` 乘上零仍是零。改用粗線墊底做光暈，不掛濾鏡。
  -->
  <line x1="250" y1="395" x2="1370" y2="395" stroke="#5DADE2" stroke-width="16" opacity="0.14" stroke-linecap="round" stroke-dasharray="22 22"/>
  <line x1="250" y1="395" x2="1370" y2="395" stroke="#5DADE2" stroke-width="7" opacity="0.58" stroke-linecap="round" stroke-dasharray="22 22"/>

  <!-- 左支：遠端貼著水平漸近線，接近極點時往上發散 -->
  <path d="M 250.0 373.1 L 257.3 372.9 L 264.5 372.6 L 271.7 372.4 L 279.0 372.1 L 286.2 371.9 L 293.4 371.6 L 300.7 371.4 L 307.9 371.1 L 315.2 370.8 L 322.4 370.5 L 329.6 370.3 L 336.9 370.0 L 344.1 369.7 L 351.4 369.4 L 358.6 369.0 L 365.8 368.7 L 373.1 368.4 L 380.3 368.0 L 387.6 367.7 L 394.8 367.3 L 402.0 367.0 L 409.3 366.6 L 416.5 366.2 L 423.7 365.8 L 431.0 365.4 L 438.2 365.0 L 445.5 364.5 L 452.7 364.1 L 459.9 363.6 L 467.2 363.1 L 474.4 362.6 L 481.7 362.1 L 488.9 361.6 L 496.1 361.1 L 503.4 360.5 L 510.6 360.0 L 517.8 359.4 L 525.1 358.7 L 532.3 358.1 L 539.6 357.4 L 546.8 356.8 L 554.0 356.1 L 561.3 355.3 L 568.5 354.6 L 575.8 353.8 L 583.0 352.9 L 590.2 352.1 L 597.5 351.2 L 604.7 350.3 L 612.0 349.3 L 619.2 348.3 L 626.4 347.2 L 633.7 346.1 L 640.9 344.9 L 648.1 343.7 L 655.4 342.4 L 662.6 341.1 L 669.9 339.7 L 677.1 338.2 L 684.3 336.6 L 691.6 334.9 L 698.8 333.2 L 706.1 331.3 L 713.3 329.3 L 720.5 327.2 L 727.8 324.9 L 735.0 322.5 L 742.2 319.9 L 749.5 317.1 L 756.7 314.1 L 764.0 310.9 L 771.2 307.4 L 778.4 303.6 L 785.7 299.4 L 792.9 294.9 L 800.2 289.9 L 807.4 284.4 L 814.6 278.2 L 821.9 271.3 L 829.1 263.6 L 836.4 254.9 L 843.6 244.9 L 850.8 233.3 L 858.1 219.9 L 865.3 204.0 L 872.5 184.9 L 879.8 161.5 L 887.0 132.4 L 894.3 94.9 L 901.5 45.0"
        fill="none" stroke="#D4B87A" stroke-width="12" opacity="1" stroke-linecap="round" stroke-linejoin="round" filter="url(#goldGlow)"/>

  <!-- 右支：接近極點時往下發散，遠端回到水平漸近線 -->
  <path d="M 986.7 760.0 L 991.1 725.4 L 995.5 696.7 L 999.8 672.7 L 1004.2 652.2 L 1008.6 634.5 L 1012.9 619.1 L 1017.3 605.6 L 1021.7 593.6 L 1026.0 582.9 L 1030.4 573.2 L 1034.8 564.6 L 1039.2 556.7 L 1043.5 549.5 L 1047.9 543.0 L 1052.3 536.9 L 1056.6 531.4 L 1061.0 526.2 L 1065.4 521.5 L 1069.7 517.1 L 1074.1 512.9 L 1078.5 509.1 L 1082.9 505.4 L 1087.2 502.1 L 1091.6 498.9 L 1096.0 495.9 L 1100.3 493.0 L 1104.7 490.3 L 1109.1 487.8 L 1113.4 485.4 L 1117.8 483.1 L 1122.2 480.9 L 1126.6 478.9 L 1130.9 476.9 L 1135.3 475.0 L 1139.7 473.2 L 1144.0 471.5 L 1148.4 469.9 L 1152.8 468.3 L 1157.1 466.8 L 1161.5 465.3 L 1165.9 463.9 L 1170.2 462.6 L 1174.6 461.3 L 1179.0 460.1 L 1183.4 458.9 L 1187.7 457.7 L 1192.1 456.6 L 1196.5 455.5 L 1200.8 454.5 L 1205.2 453.5 L 1209.6 452.5 L 1213.9 451.6 L 1218.3 450.7 L 1222.7 449.8 L 1227.1 449.0 L 1231.4 448.2 L 1235.8 447.4 L 1240.2 446.6 L 1244.5 445.8 L 1248.9 445.1 L 1253.3 444.4 L 1257.6 443.7 L 1262.0 443.0 L 1266.4 442.4 L 1270.8 441.7 L 1275.1 441.1 L 1279.5 440.5 L 1283.9 439.9 L 1288.2 439.4 L 1292.6 438.8 L 1297.0 438.3 L 1301.3 437.7 L 1305.7 437.2 L 1310.1 436.7 L 1314.5 436.2 L 1318.8 435.7 L 1323.2 435.3 L 1327.6 434.8 L 1331.9 434.3 L 1336.3 433.9 L 1340.7 433.5 L 1345.0 433.1 L 1349.4 432.6 L 1353.8 432.2 L 1358.2 431.9 L 1362.5 431.5 L 1366.9 431.1 L 1371.3 430.7 L 1375.6 430.4 L 1380.0 430.0"
        fill="none" stroke="#D4B87A" stroke-width="12" opacity="1" stroke-linecap="round" stroke-linejoin="round" filter="url(#goldGlow)"/>

  <!-- 零點 x = 2：函數真正穿過 x 軸的地方，在右支上 -->
  <circle cx="1090" cy="500" r="15" fill="#8BCC97" opacity="0.96"/>

  <!-- 可去不連續（洞）：分子分母同時有 (x − m) 因式時留下的空心點 -->
  <circle cx="713" cy="329" r="19" fill="#0A0A0A" opacity="1" stroke="#D4B87A" stroke-width="7"/>
</svg>
