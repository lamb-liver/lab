name: Deploy Astro to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (fatal gate)
        run: npm run typecheck:fatal

      - name: Test
        run: npm test

      - name: Content release audit
        run: npm run audit:content

      - name: Integration audit
        run: npm run audit:integration

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Some seo-ux cases assert built output under dist/.
      - name: Build
        run: npm run build

      # playwright.config.ts uses channel "chrome"; ubuntu-latest ships Chrome.
      - name: SEO / UX regression suite
        run: npm run test:seo-ux

      # Full sweep: six works shipped broken (truncated const) while only a
      # sampled smoke ran; one dev-server boot covers every work page.
      - name: Works smoke suite
        run: npm run test:works-smoke

      - name: Sampled explore smoke
        run: npm run smoke:explore -- vectors

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: [build, e2e]

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
